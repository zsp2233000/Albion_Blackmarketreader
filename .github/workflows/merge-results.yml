name: Merge Results (08:00 UTC)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate split result files
        working-directory: Albion_ProfitChecker/ui
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const paths = ['public/results-1.js', 'public/results-2.js'];
          for (const path of paths) {
            if (!fs.existsSync(path)) {
              throw new Error(`Missing required split file: ${path}`);
            }
            const bytes = fs.statSync(path).size;
            console.log(path, bytes, 'bytes');
          }
          console.log('Dashboard reads split result files directly. Skipping merged results.js generation.');
          NODE

      - name: Trigger Vercel Deploy Hook
        if: env.VERCEL_DEPLOY_HOOK_URL != ''
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: curl -X POST "$VERCEL_DEPLOY_HOOK_URL"
