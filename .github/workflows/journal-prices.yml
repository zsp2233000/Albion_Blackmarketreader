name: Build Journal Prices (EU + US)

on:
  workflow_dispatch:
  schedule:
    # Crafting-journal (book) empty/full prices, after the material refresh.
    - cron: "45 10 * * *"

permissions:
  contents: write

concurrency:
  group: journal-prices
  cancel-in-progress: true

jobs:
  build-journal-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch journal prices
        working-directory: Albion_ProfitChecker/ui
        run: node scripts/refresh-journal-prices.mjs

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain Albion_ProfitChecker/ui/public/data/journals-eu.json Albion_ProfitChecker/ui/public/data/journals-us.json)" ]; then
            git add Albion_ProfitChecker/ui/public/data/journals-eu.json Albion_ProfitChecker/ui/public/data/journals-us.json
            git commit -m "chore: update crafting journal prices (eu/us)"
          else
            echo "No journal price changes"
          fi

      - name: Push changes
        if: success()
        run: |
          branch=$(git rev-parse --abbrev-ref HEAD)
          git pull --rebase origin "$branch" || true
          if [ -n "$(git log origin/$(git rev-parse --abbrev-ref HEAD)..HEAD)" ]; then
            git push
          else
            echo "Nothing to push"
          fi
