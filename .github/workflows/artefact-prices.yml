name: Build Artefact Prices (EU + US)

on:
  workflow_dispatch:
  schedule:
    - cron: "20 9 * * *"

permissions:
  contents: write

jobs:
  build-artefact-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch artefact prices (Lymhurst only)
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const idsPath = path.join(process.cwd(), "artefact-ids-only.json");
          const idsFallback = path.join(process.cwd(), "Albion_ProfitChecker", "artefact-ids-only.json");
          const outputDir = path.join("Albion_ProfitChecker", "ui", "premium-plus", "premium-features", "Blackmarket-Crafter", "data");
          const city = "Lymhurst";
          const chunkSize = 50;
          const delayMs = 1500;

          const regions = [
            { key: "eu", host: "https://europe.albion-online-data.com/api/v2/stats" },
            { key: "us", host: "https://west.albion-online-data.com/api/v2/stats" }
          ];

          const ids = JSON.parse(fs.readFileSync(fs.existsSync(idsPath) ? idsPath : idsFallback, "utf8"));

          async function fetchPrices(host) {
            const out = [];
            for (let i = 0; i < ids.length; i += chunkSize) {
              const slice = ids.slice(i, i + chunkSize);
              const url = `${host}/prices/${slice.join(",")}.json?locations=${encodeURIComponent(city)}`;
              const res = await fetch(url);
              if (!res.ok) {
                console.error("Fetch failed", res.status, url);
                continue;
              }
              const data = await res.json();
              for (const row of data) {
                const price = Number(row.sell_price_min || 0);
                if (!price) continue;
                out.push({
                  itemId: row.item_id,
                  city: row.city,
                  price
                });
              }
              const hasMore = i + chunkSize < ids.length;
              if (hasMore) {
                await new Promise((resolve) => setTimeout(resolve, delayMs));
              }
            }
            return out;
          }

          (async () => {
            fs.mkdirSync(outputDir, { recursive: true });
            const now = new Date().toISOString();
            for (const region of regions) {
              const items = await fetchPrices(region.host);
              const payload = {
                generatedAt: now,
                region: region.key,
                city,
                count: items.length,
                items
              };
              const outPath = path.join(outputDir, `artefacts-${region.key}.json`);
              fs.writeFileSync(outPath, JSON.stringify(payload));
              console.log(`Wrote ${outPath}: ${items.length} rows`);
            }
          })().catch((err) => {
            console.error(err);
            process.exit(1);
          });
          NODE

      - name: Commit artefact price outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain Albion_ProfitChecker/ui/premium-plus/premium-features/Blackmarket-Crafter/data/artefacts-eu.json Albion_ProfitChecker/ui/premium-plus/premium-features/Blackmarket-Crafter/data/artefacts-us.json)" ]; then
            git add Albion_ProfitChecker/ui/premium-plus/premium-features/Blackmarket-Crafter/data/artefacts-eu.json Albion_ProfitChecker/ui/premium-plus/premium-features/Blackmarket-Crafter/data/artefacts-us.json
            git commit -m "chore: update artefact prices (eu/us)"
          else
            echo "No artefact price changes"
          fi

      - name: Push changes
        if: success()
        run: |
          branch=$(git rev-parse --abbrev-ref HEAD)
          git pull --rebase origin "$branch" || true
          if [ -n "$(git log origin/$(git rev-parse --abbrev-ref HEAD)..HEAD)" ]; then
            git push
          else
            echo "Nichts zu pushen"
          fi
