name: Build Material Prices by City (EU + US)

on:
  workflow_dispatch:
  schedule:
    # Runs after existing 09:00/09:15/09:20 jobs to avoid overlap.
    - cron: "45 9 * * *"

permissions:
  contents: write

concurrency:
  group: materials-prices-by-city
  cancel-in-progress: true

jobs:
  build-material-prices-by-city:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build city material prices with zero fallback
        working-directory: Albion_ProfitChecker/ui
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const bases = ["METALBAR", "PLANKS", "CLOTH", "LEATHER"];
          const tiers = [4, 5, 6, 7, 8];
          const enchants = [0, 1, 2, 3];
          const cities = ["Lymhurst", "Caerleon", "Bridgewatch", "Martlock", "Fort Sterling", "Thetford"];
          const chunkSize = 50;
          const delayMs = 1400;

          const outputDir = path.join("public", "data");
          const regions = [
            { key: "eu", host: "https://europe.albion-online-data.com/api/v2/stats" },
            { key: "us", host: "https://west.albion-online-data.com/api/v2/stats" }
          ];

          function buildItemIds() {
            const ids = [];
            for (const base of bases) {
              for (const tier of tiers) {
                for (const enchant of enchants) {
                  if (enchant > 0) {
                    ids.push(`T${tier}_${base}_LEVEL${enchant}@${enchant}`);
                  } else {
                    ids.push(`T${tier}_${base}`);
                  }
                }
              }
            }
            return ids;
          }

          function parseMeta(itemId) {
            const tierMatch = itemId.match(/^T(\d+)_/);
            const enchantMatch = itemId.match(/@(\d+)/);
            const tier = tierMatch ? Number(tierMatch[1]) : null;
            const enchant = enchantMatch ? Number(enchantMatch[1]) : 0;
            return { tier, enchant };
          }

          async function fetchCurrentByCity(host, itemIds) {
            const byItem = new Map();
            const locations = encodeURIComponent(cities.join(","));

            for (let i = 0; i < itemIds.length; i += chunkSize) {
              const slice = itemIds.slice(i, i + chunkSize);
              const url = `${host}/prices/${slice.join(",")}.json?locations=${locations}`;
              const res = await fetch(url);
              if (!res.ok) {
                console.error("Fetch failed", res.status, url);
                continue;
              }
              const data = await res.json();
              for (const row of data) {
                const itemId = row.item_id;
                const city = row.city;
                if (!itemId || !city || !cities.includes(city)) continue;
                const price = Number(row.sell_price_min || 0);
                if (!byItem.has(itemId)) byItem.set(itemId, new Map());
                const perCity = byItem.get(itemId);
                const prev = perCity.get(city);
                if (!prev || (price > 0 && price < prev)) {
                  perCity.set(city, price > 0 ? price : 0);
                }
              }

              if (i + chunkSize < itemIds.length) {
                await new Promise((resolve) => setTimeout(resolve, delayMs));
              }
            }

            return byItem;
          }

          (async () => {
            fs.mkdirSync(outputDir, { recursive: true });
            const itemIds = buildItemIds();
            const generatedAt = new Date().toISOString();

            for (const region of regions) {
              const byItem = await fetchCurrentByCity(region.host, itemIds);
              const items = [];

              for (const itemId of itemIds) {
                const { tier, enchant } = parseMeta(itemId);
                const cityPrices = {};
                const itemCityMap = byItem.get(itemId) || new Map();

                for (const city of cities) {
                  cityPrices[city] = Number(itemCityMap.get(city) || 0);
                }

                items.push({
                  itemId,
                  tier,
                  enchant,
                  prices: cityPrices
                });
              }

              const payload = {
                generatedAt,
                region: region.key,
                cities,
                count: items.length,
                items
              };

              const outPath = path.join(outputDir, `materials-cities-${region.key}.json`);
              fs.writeFileSync(outPath, JSON.stringify(payload));
              console.log(`Wrote ${outPath}: ${items.length} items x ${cities.length} cities`);
            }
          })().catch((err) => {
            console.error(err);
            process.exit(1);
          });
          NODE

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain Albion_ProfitChecker/ui/public/data/materials-cities-eu.json Albion_ProfitChecker/ui/public/data/materials-cities-us.json)" ]; then
            git add Albion_ProfitChecker/ui/public/data/materials-cities-eu.json Albion_ProfitChecker/ui/public/data/materials-cities-us.json
            git commit -m "chore: update city material prices (eu/us)"
          else
            echo "No city material price changes"
          fi

      - name: Push changes
        if: success()
        run: |
          branch=$(git rev-parse --abbrev-ref HEAD)
          git pull --rebase origin "$branch" || true
          if [ -n "$(git log origin/$(git rev-parse --abbrev-ref HEAD)..HEAD)" ]; then
            git push
          else
            echo "Nichts zu pushen"
          fi
