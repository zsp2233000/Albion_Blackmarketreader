name: Food and Potion Prices (US + EU + Asia)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: read

concurrency:
  group: food-potion-prices
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        region: [us, eu, asia]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Refresh one region
        working-directory: Albion_ProfitChecker/ui
        run: node scripts/refresh-food-potion-data.mjs "${{ matrix.region }}"
      - uses: actions/upload-artifact@v4
        with:
          name: food-potion-${{ matrix.region }}
          path: |
            Albion_ProfitChecker/ui/public/data/consumable-ingredient-prices-${{ matrix.region }}.json
            Albion_ProfitChecker/ui/public/data/food-prices-${{ matrix.region }}.json
            Albion_ProfitChecker/ui/public/data/potion-prices-${{ matrix.region }}.json
          if-no-files-found: error
  publish:
    needs: collect
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: food-potion-*
          path: Albion_ProfitChecker/ui/public/data
          merge-multiple: true
      - name: Commit outputs once
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Albion_ProfitChecker/ui/public/data/consumable-ingredient-prices-*.json Albion_ProfitChecker/ui/public/data/food-prices-*.json Albion_ProfitChecker/ui/public/data/potion-prices-*.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh food and potion data"
            git pull --rebase origin "$(git branch --show-current)"
            git push origin "HEAD:$(git branch --show-current)"
          fi
