name: Merge Results EU (09:00 UTC)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"

permissions:
  contents: write

jobs:
  merge-eu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Blackmarket-Crafter data/bm-crafter-us.json + data/bm-crafter-eu.json
        working-directory: Albion_ProfitChecker/ui
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const dir = 'public/data';
          fs.mkdirSync(dir, { recursive: true });

          const read = (p) => {
            if (!fs.existsSync(p)) return [];
            const raw = fs.readFileSync(p, 'utf8')
              .replace(/^\uFEFF/, '')
              .replace(/^window\\.results\\s*=\\s*/, '')
              .replace(/;?\\s*$/, '');
            const match = raw.match(/(\[[\s\S]*\]|\{[\s\S]*\})/);
            if (!match) {
              console.error('Invalid JSON format in:', p);
              return [];
            }
            try {
              return JSON.parse(match[0]);
            } catch (err) {
              console.error('JSON parse failed in:', p, err.message);
              return [];
            }
          };

          const merge = (paths) => paths.flatMap((path) => read(path));
          const pick = (rows) => rows.flatMap((r) => {
            if (!r || typeof r !== 'object') return [];
            const id = typeof r.id === 'string' ? r.id : '';
            if (!id) return [];
            const bm = Number.isFinite(r.bm) ? r.bm : (typeof r.bm === 'string' && r.bm.trim() !== '' && Number.isFinite(Number(r.bm)) ? Number(r.bm) : null);
            const sold = Number.isFinite(r.sold) ? r.sold : (typeof r.sold === 'string' && r.sold.trim() !== '' && Number.isFinite(Number(r.sold)) ? Number(r.sold) : null);
            return [[id, bm, sold]];
          });
          const writeCompact = (file, region, rows) => {
            const payload = {
              generatedAt: new Date().toISOString(),
              region,
              items: rows
            };
            const target = `${dir}/${file}`;
            fs.writeFileSync(target, JSON.stringify(payload));
            console.log(file, fs.statSync(target).size, 'bytes', rows.length, 'items');
          };

          const us = merge(['public/results-1.js', 'public/results-2.js']);
          const eu = merge(['public/results-eu-1.js', 'public/results-eu-2.js']);
          writeCompact('bm-crafter-us.json', 'us', pick(us));
          writeCompact('bm-crafter-eu.json', 'eu', pick(eu));
          fs.writeFileSync(dir + '/bm-crafter-metadata.json', JSON.stringify({
            generatedAt: new Date().toISOString(),
            sources: ['results-1.js', 'results-2.js', 'results-eu-1.js', 'results-eu-2.js']
          }));
          NODE

      - name: Commit merged results EU
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain Albion_ProfitChecker/ui/public/data/bm-crafter-us.json Albion_ProfitChecker/ui/public/data/bm-crafter-eu.json Albion_ProfitChecker/ui/public/data/bm-crafter-metadata.json)" ]; then
            git add Albion_ProfitChecker/ui/public/data/bm-crafter-us.json Albion_ProfitChecker/ui/public/data/bm-crafter-eu.json Albion_ProfitChecker/ui/public/data/bm-crafter-metadata.json
            git commit -m "chore: refresh bm crafter data"
          else
            echo "Keine Aenderungen in bm-crafter data"
          fi

      - name: Push changes
        if: success()
        run: |
          branch=$(git rev-parse --abbrev-ref HEAD)
          git pull --rebase origin "$branch" || true
          if [ -n "$(git log origin/$(git rev-parse --abbrev-ref HEAD)..HEAD)" ]; then
            git push
          else
            echo "Nichts zu pushen"
          fi

      - name: Trigger Vercel Deploy Hook
        if: env.VERCEL_DEPLOY_HOOK_URL != ''
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: curl -X POST "$VERCEL_DEPLOY_HOOK_URL"
