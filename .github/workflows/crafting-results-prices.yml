name: Build Crafting Prices (US + EU + Asia)

on:
  workflow_dispatch:
  schedule:
    - cron: "5 10 * * *"

permissions:
  contents: read

concurrency:
  group: crafting-results-prices
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        region: [us, eu, asia]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Refresh one region
        working-directory: Albion_ProfitChecker/ui
        run: node scripts/refresh-crafting-data.mjs "${{ matrix.region }}"
      - uses: actions/upload-artifact@v4
        with:
          name: crafting-${{ matrix.region }}
          path: |
            Albion_ProfitChecker/ui/public/data/materials-cities-${{ matrix.region }}.json
            Albion_ProfitChecker/ui/public/data/materials-${{ matrix.region }}.json
            Albion_ProfitChecker/ui/public/data/artefacts-${{ matrix.region }}.json
            Albion_ProfitChecker/ui/public/data/crafting-results-${{ matrix.region }}.json
            Albion_ProfitChecker/ui/public/results-crafting-${{ matrix.region }}.js
          if-no-files-found: error
  publish:
    needs: collect
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: crafting-*
          path: Albion_ProfitChecker/ui/public
          merge-multiple: true
      - name: Commit outputs once
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Albion_ProfitChecker/ui/public/data/materials-cities-*.json Albion_ProfitChecker/ui/public/data/materials-*.json Albion_ProfitChecker/ui/public/data/artefacts-*.json Albion_ProfitChecker/ui/public/data/crafting-results-*.json Albion_ProfitChecker/ui/public/results-crafting-*.js
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh crafting calculator data"
            git pull --rebase origin "$(git branch --show-current)"
            git push origin "HEAD:$(git branch --show-current)"
          fi
